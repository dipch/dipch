name: ci

on:
  workflow_dispatch: 
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  update:
    name: Update stats card
    runs-on: ubuntu-latest
    steps:
      - uses: datarootsio/github-stats-card@v1
        with:
          username: dipch
          gh_token_stats: ${{ secrets.GH_PAT }}
          gh_token_commits: ${{ secrets.GITHUB_TOKEN }}
          badge_path: assets/badge.svg
          header: "🧬 hi i'm"
          about: "need macha tea"
          theme: hypnotoad
          commit_message: "Update GitHub stats badge"

  languages:
    name: Update language stats
    needs: update # <--- This prevents the Git conflict!
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_PAT }}
          filename: assets/languages.svg
          base: "" 
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
